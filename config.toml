title = "Charlie Bury"
baseURL = "https://charliebury.netlify.app/"
languageCode = "en-uk"
theme = ["ananke"]
resourceDir = "themes/ananke/resources"

DefaultContentLanguage = "en"
Paginate = 12 
googleAnalytics = ""
enableRobotsTXT = true

[languages]
  [languages.en]
    title = "Charlie Bury"
    weight = 1
    contentDir = "content/en"
    # languageDirection = 'rtl' for Right-To-Left languages

[sitemap]
  changefreq = "monthly"
  priority = 0.5
  filename = "sitemap.xml"

[params]
  disable_share = true
  text_color = "dary-gray"
  author = ""
  favicon = ""
  site_logo = ""
  description = "Charlie Bury"
  # choose a background color from any on this page: https://tachyons.io/docs/themes/skins/ and preface it with "bg-"
  background_color_class = "bg-black"
  recent_posts_number = 3
  commentoEnable = false
  mainSections = []
  custom_css = ["css/custom.css"]

[[params.ananke_socials]]
name = "linkedin"
url = "https://www.linkedin.com/in/charliebury"

[[params.ananke_socials]]
  name = "letterboxd"
  url = "https://boxd.it/3wZi3"
  label = "Letterboxd"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

